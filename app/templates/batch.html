<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Batch verification — TTB Label Verification</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="container">
    <a class="back" href="/">&larr; Single label</a>
    <h1>Batch verification</h1>
    <p class="lead">
      Verify up to {{ cap }} labels at once. Upload the label images and one CSV
      that lists, for each file, the claimed brand and alcohol content.
    </p>

    <form class="card" action="/batch" method="post" enctype="multipart/form-data">
      <label class="field">
        <span class="field-label">1. Label images (up to {{ cap }})</span>
        <input type="file" name="images" accept="image/*" multiple required>
      </label>

      <label class="field">
        <span class="field-label">2. CSV: filename, brand, alcohol_content</span>
        <input type="file" name="mapping" accept=".csv,text/csv" required>
        <span class="hint">
          Need the format? <a href="/static/batch-template.csv" download>Download the CSV template</a>.
        </span>
      </label>

      <p class="hint">
        Verifying a full batch can take ~20&nbsp;seconds — please submit once and wait
        for the results; don't re-submit.
      </p>

      <button type="submit" class="btn-primary">Verify batch</button>
    </form>
  </main>
</body>
</html>
